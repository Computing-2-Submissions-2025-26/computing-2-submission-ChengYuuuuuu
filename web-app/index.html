<!doctype html>
<html lang="en-gb">
<meta charset="utf-8">
<title>Rummikub</title>
<link rel="stylesheet" href="default.css">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Silkscreen&family=VT323&display=swap" rel="stylesheet">
<link rel="icon" href="./assets/favicon.png">
<script type="module" src="main.js"></script>
<audio id="bgm" src="./assets/30_欢乐斗地主背景音乐.mp3" loop></audio>

<div id="app">
  <div id="start-screen">
    <img id="title-image" src="assets/title.png" alt="Rummikub Duo">
    <div class="cover-buttons">
      <button class="cover-btn" data-mode="single" data-difficulty="normal">Single Player (Normal)</button>
      <button class="cover-btn" data-mode="single" data-difficulty="hard">Single Player (Hard)</button>
      <button class="cover-btn" data-mode="twoPlayer">Two Players</button>
    </div>
  </div>

  <div id="game-screen" style="display:none">
    <div id="top-bar">
      <div id="top-left">
        <div class="player-info" id="player2-info">
          <div class="avatar" id="avatar-p2">CPU</div>
          <span class="tile-count" id="count-p2">14</span>
        </div>
      </div>
      <div id="center-info">
        <span id="turn-indicator"></span>
        <span id="pool-info"></span>
        <span id="meld-status"></span>
        <button id="new-game-btn">NEW</button>
        <button id="music-btn">♪</button>
      </div>
    </div>

    <div id="ai-hand"></div>

    <div id="game-middle">
      <div id="board-area">
        <div id="board-groups"></div>
      </div>
      <div id="draw-pile-container">
        <div id="draw-pile">
          <div class="pile-stack">
            <div class="pile-card"></div>
            <div class="pile-card"></div>
            <div class="pile-card"></div>
            <div class="pile-card"></div>
            <div class="pile-card"></div>
          </div>
          <div id="pile-count">106</div>
        </div>
      </div>
    </div>

    <div id="message-area"></div>

    <div id="controls">
      <button id="submit-btn" disabled>Submit Turn</button>
      <button id="cancel-btn" disabled>Cancel Turn</button>
      <button id="draw-btn" style="display:none">Draw & Skip</button>
    </div>

    <div id="bottom-bar">
      <div id="bottom-left">
        <div class="player-info" id="player1-info">
          <div class="avatar" id="avatar-p1">You</div>
          <span class="tile-count" id="count-p1">14</span>
        </div>
      </div>
      <div id="rack-area">
        <div id="rack-tiles" class="tile-row"></div>
      </div>
    </div>
  </div>

  <div id="gameover-screen" style="display:none">
    <h2 id="winner-text"></h2>
    <button id="play-again-btn">Play Again</button>
  </div>
</div>

<div id="tutorial-overlay">
  <div id="tutorial-dialog">
    <div id="tutorial-avatar">
      <span id="tutorial-emoji">😊</span>
    </div>
    <div id="tutorial-content">
      <div id="tutorial-text"></div>
      <div id="tutorial-buttons"></div>
      <button id="tutorial-skip">Skip Tutorial</button>
    </div>
  </div>
</div>
