<!doctype html>
<html lang="en-gb">
<meta charset="utf-8">
<title>Rummikub</title>
<link rel="stylesheet" href="default.css">
<link rel="icon" href="./assets/favicon.png">
<script type="module" src="main.js"></script>

<div id="app">
  <div id="start-screen">
    <h1>Rummikub</h1>
    <p class="subtitle">Two-Player Tile Game</p>
    <div class="mode-buttons">
      <button data-mode="single" data-difficulty="normal">Single Player (Normal)</button>
      <button data-mode="single" data-difficulty="hard">Single Player (Hard)</button>
      <button data-mode="twoPlayer">Two Players</button>
    </div>
  </div>

  <div id="game-screen" style="display:none">
    <div id="top-bar">
      <div id="game-info">
        <div class="player-info" id="player1-info">
          <div class="avatar" id="avatar-p1">P1</div>
          <span class="tile-count" id="count-p1">14</span>
        </div>
        <div class="player-info" id="player2-info">
          <div class="avatar" id="avatar-p2">P2</div>
          <span class="tile-count" id="count-p2">14</span>
        </div>
      </div>
      <div id="center-info">
        <span id="turn-indicator"></span>
        <span id="pool-info"></span>
        <span id="meld-status"></span>
      </div>
      <button id="new-game-btn">New Game</button>
    </div>

    <div id="board-area">
      <div id="board-groups"></div>
    </div>

    <div id="controls">
      <button id="submit-btn" disabled>Submit Turn</button>
      <button id="cancel-btn" disabled>Cancel Turn</button>
      <button id="draw-btn">Draw & Skip</button>
    </div>

    <div id="rack-area">
      <div id="rack-tiles" class="tile-row"></div>
    </div>

    <div id="message-area"></div>
  </div>

  <div id="gameover-screen" style="display:none">
    <h2 id="winner-text"></h2>
    <button id="play-again-btn">Play Again</button>
  </div>
</div>
